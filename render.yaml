services:
  - type: web
    name: community-ai-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build:server
    startCommand: npm start --workspace=server
    envVars:
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: "*"
